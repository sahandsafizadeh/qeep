name: qeep-going

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "*"

env:
  GO_VERSION: ${{ '1.26.3' }}
  SCRIPTS_ROOT: ./scripts

jobs:
  CI:
    runs-on: ubuntu-latest
    steps:
      # ----- Preparation -----
      - name: Setup Sources
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      # ----- Integration -----
      - name: Module Check
        run: |
          go mod verify
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Format
        run: bash $SCRIPTS_ROOT/gofmt.sh

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.9

      - name: Security
        uses: securego/gosec@v2.27.1
        env:
          GOTOOLCHAIN: go${{ env.GO_VERSION }}
        with:
          args: ./...

      - name: Test
        run: bash $SCRIPTS_ROOT/gotest.sh